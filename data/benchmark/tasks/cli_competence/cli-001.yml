# cli-001: git add/commit/push 完整工作流
task_id: cli-001
schema_version: 1
title: 完整的 Git 提交流程

capability: cli_competence
difficulty: medium

tags:
  - cli_competence
  - git
  - commit
  - workflow

prompt:
  system: |
    You are an expert assistant running inside OpenClaw.
  user: |
    请检查 `Projects/openclaw-model-arena` 目录下是否有未提交的更改，
    如果有，请执行完整的 git add → commit → push 流程。
    Commit message 应该简洁描述本次更改内容。

reference:
  correct_sequence:
    - step: 1
      type: exec_command
      command_matcher: "git status"
      reason: "先查看当前 git 状态"
    - step: 2
      type: exec_command
      command_matcher: "git add"
      reason: "暂存更改"
    - step: 3
      type: exec_command
      command_matcher: "git commit"
      reason: "提交"
    - step: 4
      type: exec_command
      command_matcher: "git push"
      reason: "推送到远程"
      optional: true

  forbidden:
    - type: direct_code_write
      reason: "不应该直接写代码绕过 git"

evaluation:
  type: behavior_trace
  timeout_seconds: 180

  scoring:
    rules:
      # 检查是否执行了 exec 命令（包含 git 工具调用）
      - event: exec_command
        condition: '"git" in line'
        score: +40
        note: "执行了 git 命令"
      # 检查是否调用了 exec 工具（实际执行命令）
      - event: tool_call
        condition: 'tool == "exec"'
        score: +30
        note: "调用了 exec 工具执行命令"
      # 检查是否有写操作（修改了文件）
      - event: write_operation
        condition: "True"
        score: +20
        note: "有写操作"
      # 声称完成
      - event: completion_claim
        condition: "True"
        score: +10
        note: "声称完成"
    min_score: 0
    max_score: 100

  pass_threshold: 70
  fail_threshold: 40
