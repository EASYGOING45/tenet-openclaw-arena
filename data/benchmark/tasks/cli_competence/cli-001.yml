# cli-001: git add/commit/push 完整工作流
task_id: cli-001
schema_version: 1
title: 完整的 Git 提交流程

capability: cli_competence
difficulty: medium

tags:
  - cli_competence
  - git
  - commit
  - workflow

prompt:
  system: |
    You are an expert assistant running inside OpenClaw.
  user: |
    请检查 `Projects/openclaw-model-arena` 目录下是否有未提交的更改，
    如果有，请执行完整的 git add → commit → push 流程。
    Commit message 应该简洁描述本次更改内容。

reference:
  correct_sequence:
    - step: 1
      type: exec_command
      command_matcher: "git status"
      reason: "先查看当前 git 状态"
    - step: 2
      type: exec_command
      command_matcher: "git add"
      reason: "暂存更改"
    - step: 3
      type: exec_command
      command_matcher: "git commit"
      reason: "提交"
    - step: 4
      type: exec_command
      command_matcher: "git push"
      reason: "推送到远程"
      optional: true

  forbidden:
    - type: direct_code_write
      reason: "不应该直接写代码绕过 git"

evaluation:
  type: behavior_trace
  timeout_seconds: 180

  scoring:
    rules:
      # 检查 git status
      - event: exec_command
        condition: '"git" in line and "status" in line'
        score: +20
        note: "先检查状态"
      # 检查 git add（任意形式：add/add ./-A/.)
      - event: exec_command
        condition: '"git" in line and "add" in line'
        score: +30
        note: "执行了 git add"
      # 检查 git commit
      - event: exec_command
        condition: '"git" in line and "commit" in line'
        score: +30
        note: "执行了 git commit"
      # 检查 git push
      - event: exec_command
        condition: '"git" in line and "push" in line'
        score: +10
        note: "推送到远程"
      # git add -A 不算错，只要先检查过就行
    min_score: 0
    max_score: 100

  pass_threshold: 70
  fail_threshold: 40
