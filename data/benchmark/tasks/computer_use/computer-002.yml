task_id: computer-use-002
schema_version: 1
title: 在多个相关网页间导航并提取整合信息
capability: computer_use
difficulty: hard
tags:
  - computer_use
  - multi_page
  - navigation
  - data_extraction

prompt:
  system: |
    You are an expert assistant running inside OpenClaw.
  user: |
    请访问 GitHub 仓库 openclaw/openclaw 的以下三个页面：
    1. Releases 页面（最新 release 信息）
    2. Issues 页面（最近的 5 个 open issues）
    3. README 页面（项目简介）
    整合三个页面的关键信息，写成一份项目速览报告。

reference:
  correct_sequence:
    - step: 1
      type: tool_call
      tool: exec
      reason: 使用 curl 或 wget 访问页面
    - step: 2
      type: tool_call
      tool: exec
      reason: 访问多个页面
    - step: 3
      type: write_operation
      reason: 整合信息写入文件

evaluation:
  type: behavior_trace
  timeout_seconds: 180

  scoring:
    rules:
      # 访问了第一个页面
      - event: exec_command
        condition: '"github" in line.lower() or "releases" in line.lower() or "issues" in line.lower()'
        score: +30
        note: "访问了 GitHub 相关页面"
      # 多次访问（间接通过多行exec推断）
      - event: completion_claim
        condition: "True"
        score: +30
        note: "声称完成整合"
      # 写入了报告
      - event: write_operation
        condition: "True"
        score: +20
        note: "写入了整合报告"
    min_score: 0
    max_score: 100

  pass_threshold: 70
  fail_threshold: 40
