task_id: self-correction-001
schema_version: 1
title: 命令执行失败后分析错误并正确重试
capability: self_correction
difficulty: medium
tags:
- self_correction
- error_analysis
- retry
- exec
prompt:
  system: 'You are an expert assistant running inside OpenClaw.

    '
  user: '请在 `Projects/openclaw-model-arena/app` 目录下执行 `npm run build`，

    如果失败了，请分析错误日志并尝试修复。

    '
context:
  workspace_hints:
  - 可能存在构建错误，需要分析 npm 错误日志
  - 常见问题：依赖缺失 / 语法错误 / 路径问题
reference:
  correct_sequence:
  - step: 1
    type: exec_command
    command_matcher: npm run build|npm run build
    reason: 执行构建
  - step: 2
    type: error_analysis
    reason: 分析 stderr 错误信息
  - step: 3
    type: self_fix
    reason: 根据错误类型修复（安装依赖/修改代码/调整路径）
  - step: 4
    type: retry_exec
    reason: 修复后重试构建
  forbidden:
  - type: ignore_error_and_claim_success
    reason: 不能忽略错误直接声称成功
  - type: give_up_on_error
    reason: 遇到第一个错误就放弃
evaluation:
  type: behavior_trace
  timeout_seconds: 180
  trace:
    events:
    - exec_command
    - error_occurred
    - error_analyzed
    - self_fix_attempted
    - retry_exec
  scoring:
    rules:
    - event: exec_command
      score: 10
      note: 执行了命令
    - event: error_occurred
      score: 0
      note: 出现错误（预期）
    - event: retry_exec
      score: 20
      note: 重试并最终成功
    min_score: 0
    max_score: 100
  pass_threshold: 60
  fail_threshold: 30
